<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentHQ · Scan to open</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='11' fill='%231c362b'/><text x='24' y='29.5' text-anchor='middle' font-family='Arial,sans-serif' font-size='16' font-weight='700' fill='white'>HQ</text><rect x='13' y='35' width='22' height='2.5' rx='1.25' fill='%23d4a437'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --forest-950: #11241c;
        --forest-900: #1c362b;
        --forest-800: #234334;
        --forest-300: #97c2a8;
        --gold-400: #d4a437;
        --gold-300: #e0bc62;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-font-smoothing: antialiased; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Inter", system-ui, sans-serif;
        color: #fff;
        background:
          radial-gradient(90% 60% at 50% 0%, rgba(212, 164, 55, 0.14), transparent 70%),
          linear-gradient(160deg, #234334 0%, #1c362b 45%, #11241c 100%);
      }
      .card {
        width: 100%;
        max-width: 380px;
        text-align: center;
      }
      .brand { display: flex; align-items: center; justify-content: center; gap: 10px; }
      .brand svg { width: 40px; height: 40px; }
      .brand h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
      .tag { margin-top: 6px; font-size: 13px; color: var(--forest-300); }
      .panel {
        position: relative;
        margin: 22px auto 0;
        width: 100%;
        background: #fff;
        border-radius: 24px;
        padding: 26px;
        box-shadow: 0 30px 60px -24px rgba(0, 0, 0, 0.6);
      }
      .panel canvas { width: 100%; height: auto; display: block; border-radius: 8px; }
      /* gold corner ticks */
      .tick { position: absolute; width: 20px; height: 20px; border: 2px solid var(--gold-400); }
      .tick.tl { top: 14px; left: 14px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
      .tick.tr { top: 14px; right: 14px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
      .tick.bl { bottom: 14px; left: 14px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
      .tick.br { bottom: 14px; right: 14px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }
      .caption { margin-top: 16px; font-size: 12px; color: var(--forest-300); word-break: break-all; }
      .actions { margin-top: 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      .btn {
        display: inline-flex; align-items: center; gap: 7px;
        height: 42px; padding: 0 18px;
        border-radius: 11px; border: 1px solid transparent;
        font-size: 13px; font-weight: 600; cursor: pointer;
        text-decoration: none; transition: all 0.15s ease;
      }
      .btn-gold { background: var(--gold-400); color: #2b1f08; }
      .btn-gold:hover { background: var(--gold-300); }
      .btn-ghost { background: rgba(255, 255, 255, 0.06); color: #fff; border-color: rgba(255, 255, 255, 0.18); }
      .btn-ghost:hover { background: rgba(255, 255, 255, 0.12); }
      .disclaimer { margin-top: 22px; font-size: 10px; line-height: 1.6; color: rgba(151, 194, 168, 0.7); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <rect width="48" height="48" rx="11" fill="var(--forest-900)" />
          <text x="24" y="29.5" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.5">HQ</text>
          <rect x="13" y="35" width="22" height="2.5" rx="1.25" fill="var(--gold-400)" />
        </svg>
        <h1>AgentHQ</h1>
      </div>
      <p class="tag">Point your camera here to open the workspace</p>

      <div class="panel">
        <span class="tick tl"></span><span class="tick tr"></span>
        <span class="tick bl"></span><span class="tick br"></span>
        <canvas id="qr" width="1024" height="1024"></canvas>
      </div>

      <p class="caption" id="caption"></p>

      <div class="actions">
        <a class="btn btn-gold" id="download" download="agenthq-qr.png">Download PNG</a>
        <a class="btn btn-ghost" id="open" target="_blank" rel="noopener">Open the demo</a>
      </div>

      <p class="disclaimer">
        Demo prototype. Scanning opens the fictional AgentHQ sample workspace.
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <script>
      // The QR target. Override with ?u=<url-encoded> to point it anywhere.
      const params = new URLSearchParams(location.search)
      const TARGET = params.get('u') || 'https://buildingresourcesms-byte.github.io/agent-hq/'

      const FOREST = '#11241c'
      const FOREST_BADGE = '#1c362b'
      const GOLD = '#d4a437'

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath()
        ctx.moveTo(x + r, y)
        ctx.arcTo(x + w, y, x + w, y + h, r)
        ctx.arcTo(x + w, y + h, x, y + h, r)
        ctx.arcTo(x, y + h, x, y, r)
        ctx.arcTo(x, y, x + w, y, r)
        ctx.closePath()
      }

      function render() {
        const canvas = document.getElementById('qr')
        const ctx = canvas.getContext('2d')

        // build QR at high error correction so the center logo is safe
        const qr = qrcode(0, 'H')
        qr.addData(TARGET)
        qr.make()
        const n = qr.getModuleCount()
        const margin = 4
        const total = n + margin * 2
        const px = 1024
        const cell = Math.floor(px / total)
        const size = cell * total
        canvas.width = size
        canvas.height = size

        // white field
        ctx.fillStyle = '#ffffff'
        ctx.fillRect(0, 0, size, size)

        // forest modules
        ctx.fillStyle = FOREST
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            if (qr.isDark(r, c)) ctx.fillRect((c + margin) * cell, (r + margin) * cell, cell, cell)
          }
        }

        // centered HQ badge: white quiet zone + forest tile + "HQ" + gold bar
        const white = Math.round(size * 0.30)
        const wx = (size - white) / 2
        ctx.fillStyle = '#ffffff'
        roundRect(ctx, wx, wx, white, white, white * 0.22)
        ctx.fill()

        const tile = Math.round(size * 0.24)
        const tx = (size - tile) / 2
        ctx.fillStyle = FOREST_BADGE
        roundRect(ctx, tx, tx, tile, tile, tile * 0.22)
        ctx.fill()

        ctx.fillStyle = '#ffffff'
        ctx.font = '700 ' + Math.round(tile * 0.4) + 'px Inter, sans-serif'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText('HQ', size / 2, tx + tile * 0.42)

        ctx.fillStyle = GOLD
        const barW = tile * 0.46
        const barH = Math.max(3, tile * 0.05)
        roundRect(ctx, size / 2 - barW / 2, tx + tile * 0.72, barW, barH, barH / 2)
        ctx.fill()

        // wire up captions + links
        document.getElementById('caption').textContent = TARGET.replace(/^https?:\/\//, '')
        document.getElementById('open').href = TARGET
        document.getElementById('download').href = canvas.toDataURL('image/png')
      }

      if (window.qrcode) render()
      else window.addEventListener('load', render)
    </script>
  </body>
</html>
